services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: itau_broker
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    ports:
      - "9092:9092"
    depends_on:
      - zookeeper
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  api:
    build:
      context: .
      dockerfile: src/ItauInvestmentBroker.API/Dockerfile
    ports:
      - "8080:8080"
    environment:
      ASPNETCORE_URLS: "http://+:8080"
      ConnectionStrings__DefaultConnection: "Server=mysql;Port=3306;Database=itau_broker;User=root;Password=root;"
      Kafka__BootstrapServers: "kafka:29092"
      Kafka__GroupId: "itau-investment-broker"
      Cotahist__DirectoryPath: "/app/cotacoes"
    volumes:
      - ./cotacoes:/app/cotacoes:ro
    depends_on:
      mysql:
        condition: service_healthy
      kafka:
        condition: service_started

  scheduler:
    build:
      context: .
      dockerfile: docker/scheduler/Dockerfile
    mem_limit: 64m
    environment:
      TZ: "America/Sao_Paulo"
      MOTOR_EXECUTION_URL: "http://api:8080/api/motor/executar-compra"
      STATE_DIR: "/state"
    volumes:
      - scheduler_state:/state
    depends_on:
      - api

volumes:
  mysql_data:
  scheduler_state:
